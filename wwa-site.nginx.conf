server {
    listen 80;
    server_name workswithagents.com workswithagents.co.uk;
    root /opt/wwa-site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /sitemap.xml {
        add_header Content-Type application/xml;
    }

    location = /llms.txt {
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    server_name workswithagents.dev;
    root /opt/wwa-site/dev;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name workswithagents.io;
    return 301 https://workswithagents.com$request_uri;
}

server {
    listen 80;
    server_name bastiongateway.com;
    return 410;
}
